name: Build Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Шаг 1: Устанавливаем Gradle в систему, чтобы создать локальный wrapper
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Шаг 2: Генерируем файлы gradlew, если их нет в репозитории
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10

      # Шаг 3: Даем права на исполнение созданному файлу
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Шаг 4: Сама сборка мода
      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Jar
          path: build/libs/*.jar
          if-no-files-found: error