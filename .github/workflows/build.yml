name: Build Minecraft Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Кэширование ускорит последующие сборки
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # ПРИНУДИТЕЛЬНО устанавливаем версию 8.10, 
          # чтобы избежать ошибки "Gradle 9.0 not supported"
          gradle-version: 8.10

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build with Gradle
        # Используем --no-daemon для стабильности на серверах GitHub
        run: ./gradlew build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Mod-Jar
          path: build/libs/*.jar
          if-no-files-found: error